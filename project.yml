name: Clawdphobia
options:
  bundleIdPrefix: com.clawdphobia
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  Clawdphobia:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/AppIcon.icns
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawdphobia.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Clawdphobia.entitlements
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: Resources/Clawdphobia-MAS.entitlements
          CODE_SIGN_STYLE: Manual
          PROVISIONING_PROFILE_SPECIFIER: ""
